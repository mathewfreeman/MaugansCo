<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2304d9c4'><circle cx='5' cy='5' r='2'/><circle cx='12' cy='5' r='2'/><circle cx='19' cy='5' r='2'/><circle cx='5' cy='12' r='2'/><circle cx='12' cy='12' r='2'/><circle cx='19' cy='12' r='2'/><circle cx='5' cy='19' r='2'/><circle cx='12' cy='19' r='2'/><circle cx='19' cy='19' r='2'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding-top: 64px !important;
        }

        .selection-glow::selection {
            background-color: rgba(4, 217, 196, 0.2);
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col justify-center items-center p-6 selection-glow">

    <main class="max-w-lg w-full bg-white px-8 py-12 sm:p-12 border border-slate-100 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] text-center fade-in">
        
        <h1 class="text-2xl font-medium tracking-tight text-slate-900 mb-1">
            maugans co.
        </h1>
        
        <p class="text-[12px] font-normal text-gray-400 tracking-[0.15em] mb-8">
            private preview
        </p>
        
        <div class="w-10 h-[1px] bg-slate-200 mx-auto mb-8"></div>
        
        <p class="text-slate-600 text-base leading-relaxed mb-6 font-normal">
            A private workspace for active projects and live previews. 
        </p>
        
        <p class="text-slate-600 text-base leading-relaxed mb-6 font-normal">
            To check on the progress of a project and provide notes, please use the specific link shared for your build.
        </p>

        <a href="mailto:hello@maugansco.com" class="inline-block text-base text-[#04d9c4] hover:text-[#03c4b1] transition-colors underline decoration-[#04d9c4]/30 hover:decoration-[#04d9c4]/60 underline-offset-4 font-light">
            hello@maugansco.com
        </a>

    </main>

    <footer class="mt-12 text-slate-400 text-xs fade-in" style="animation-delay: 0.2s; opacity: 0;">
        &copy; <script>document.write(new Date().getFullYear())</script> Maugans Co.
    </footer>

    <script>
    (function() {
        const style = document.createElement('style');
        style.textContent = `
            #maugans-preview-header {
                position: fixed; top: 0; left: 0; width: 100%; height: 64px;
                background: #ffffff; border-bottom: 1px solid #ececec;
                display: flex; align-items: center; justify-content: flex-start;
                padding: 0 24px; box-sizing: border-box; z-index: 99999;
                font-family: 'IBM Plex Sans', sans-serif; color: #1a1a1a;
            }
            .maugans-header-left { display: flex; align-items: center; gap: 12px; }
            .maugans-logo-svg { width: 20px; height: 20px; display: block; }
            .maugans-header-title { font-weight: 500; font-size: 16px; letter-spacing: -0.01em; }
        `;
        document.head.appendChild(style);

        const header = document.createElement('header');
        header.id = 'maugans-preview-header';
        header.innerHTML = `
            <div class="maugans-header-left">
                <svg class="maugans-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#04d9c4">
                    <circle cx="5" cy="5" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="19" cy="5" r="2"/>
                    <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
                    <circle cx="5" cy="19" r="2"/><circle cx="12" cy="19" r="2"/><circle cx="19" cy="19" r="2"/>
                </svg>
                <div class="maugans-header-title">maugans co.</div>
            </div>
        `;
        document.body.prepend(header);
    })();
    </script>

</body>

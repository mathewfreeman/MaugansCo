<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maugans Co. | Development Server</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* A subtle fade-in animation to give it a premium feel */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        body {
            /* Using IBM Plex Sans for a precise, technical look */
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-[#fafafa] text-slate-800 min-h-screen flex flex-col justify-center items-center p-6 selection:bg-slate-200">

    <main class="max-w-lg w-full bg-white px-8 py-12 sm:p-12 border border-slate-100 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] text-center fade-in">
        
        <!-- Minimalist Logo/Brand Text -->
        <h1 class="text-2xl sm:text-3xl font-medium tracking-tight text-slate-900 mb-1">
            maugans co.
        </h1>
        
        <!-- Subtitle -->
        <p class="text-xs sm:text-sm font-medium text-slate-400 uppercase tracking-[0.2em] mb-8">
            Staging Environment
        </p>
        
        <!-- Divider -->
        <div class="w-10 h-[1px] bg-slate-200 mx-auto mb-8"></div>
        
        <!-- Core Message -->
        <p class="text-slate-600 text-base leading-relaxed mb-6">
            This domain serves as a private staging and testing server for client projects currently under development. 
        </p>
        
        <p class="text-slate-500 text-sm leading-relaxed">
            If you are a client looking for your work-in-progress build, please navigate to the exact secure URL provided to you.
        </p>

    </main>

    <!-- Very subtle footer -->
    <footer class="mt-12 text-slate-400 text-xs fade-in" style="animation-delay: 0.2s; opacity: 0;">
        &copy; <script>document.write(new Date().getFullYear())</script> Maugans Co. All rights reserved.
    </footer>

</body>
</html>

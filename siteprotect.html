<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>maugans co. | Secure Preview</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'IBM Plex Sans', sans-serif; }
        .hidden-content { display: none !important; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body class="bg-[#fafafa] text-slate-800">

    <div id="gate" class="min-h-screen flex flex-col justify-center items-center p-6 hidden-content">
        <main class="max-w-md w-full bg-white px-8 py-12 border border-slate-100 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] text-center fade-in">
            <h1 class="text-2xl font-medium tracking-tight text-slate-900 mb-1">maugans co.</h1>
            <p class="text-xs font-medium text-[#04d9c4] uppercase tracking-[0.2em] mb-8">Development Preview</p>
            
            <div class="w-10 h-[1px] bg-slate-200 mx-auto mb-8"></div>
            
            <input type="password" id="pass-field" placeholder="Enter Password" 
                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-center focus:outline-none focus:border-[#04d9c4] transition-colors mb-4">
            
            <button onclick="unlock()" 
                    class="w-full py-3 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-800 transition-all">
                View Project
            </button>
            <p id="error" class="text-red-500 text-xs mt-4 opacity-0 transition-opacity">Access Denied.</p>
        </main>
        <footer class="mt-8 text-slate-400 text-xs">&copy; 2026 Maugans Co.</footer>
    </div>

    <div id="content" class="hidden-content">
        <!-- INSERT COMPLETE WEBSITE CODE HERE -->
    </div>

    <script>
        const ACCESS_KEY = "zb10"; 
        const STORAGE_KEY = "maugans_preview_auth_date";

        function getNYDate() {
            try {
                return new Intl.DateTimeFormat('en-US', {
                    timeZone: 'America/New_York',
                    year: 'numeric',
                    month: 'numeric',
                    day: 'numeric'
                }).format(new Date());
            } catch (e) {
                // Fallback to local date if the timezone string is unsupported
                return new Date().toLocaleDateString('en-US');
            }
        }

        function checkSession() {
            try {
                const storedDate = localStorage.getItem(STORAGE_KEY);
                const currentDate = getNYDate();

                if (storedDate === currentDate) {
                    showContent();
                } else {
                    showGate();
                }
            } catch (e) {
                // If localStorage is blocked (e.g. Incognito), always show gate
                showGate();
            }
        }

        function unlock() {
            const inputField = document.getElementById('pass-field');
            const error = document.getElementById('error');
            
            // Added .trim() to handle accidental spaces
            if (inputField.value.trim() === ACCESS_KEY) {
                try {
                    localStorage.setItem(STORAGE_KEY, getNYDate());
                } catch (e) {
                    console.warn("LocalStorage blocked; session will not persist.");
                }
                showContent();
            } else {
                error.classList.remove('opacity-0');
                setTimeout(() => error.classList.add('opacity-0'), 2000);
            }
        }

        function showContent() {
            document.getElementById('gate').classList.add('hidden-content');
            document.getElementById('content').classList.remove('hidden-content');
        }

        function showGate() {
            document.getElementById('gate').classList.remove('hidden-content');
            document.getElementById('content').classList.add('hidden-content');
        }

        document.getElementById('pass-field').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') unlock();
        });

        window.addEventListener('DOMContentLoaded', checkSession);
    </script>
</body>
</html>
